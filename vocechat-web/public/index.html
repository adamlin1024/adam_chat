    <!-- Suppress ResizeObserver errors - must be first script -->
    <script>
      // Suppress benign ResizeObserver errors from virtualized lists
      // This is a known browser issue and doesn't affect functionality
      // Reference: https://github.com/WICG/resize-observer/issues/38

      (function() {
        function isResizeObserverError(message) {
          return message && (
            message.includes('ResizeObserver loop') ||
            message.includes('ResizeObserver loop completed') ||
            message.includes('ResizeObserver loop limit exceeded')
          );
        }

        // Intercept window.onerror
        const originalOnError = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          if (typeof message === 'string' && isResizeObserverError(message)) {
            return true; // Suppress ResizeObserver errors
          }
          if (originalOnError) {
            return originalOnError.apply(this, arguments);
          }
          return false;
        };

        // Intercept error events (capture phase to catch early)
        window.addEventListener('error', function(e) {
          if (e.message && isResizeObserverError(e.message)) {
            e.stopImmediatePropagation();
            e.preventDefault();
            return true;
          }
        }, true);

        // Intercept console.error
        const originalConsoleError = console.error;
        console.error = function() {
          const args = Array.from(arguments);
          if (args.length > 0 && typeof args[0] === 'string' && isResizeObserverError(args[0])) {
            return; // Suppress
          }
          originalConsoleError.apply(console, args);
        };
      })();
    </script>

    <script>
      // 開機前先依使用者主題設定 html class，避免 splash 期間閃爍
      (function () {
        var saved = localStorage.theme || "auto";
        var isDark = saved === "dark" || (saved === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.add(isDark ? "dark" : "light");
      })();
    </script>
    <style>
      :root { color-scheme: dark light; }
      html.dark  { --c-splash-bg: #08090b; --c-splash-dot: #5eead4; }
      html.light { --c-splash-bg: #f2efe9; --c-splash-dot: #0d9488; }
      html, body {
        background-color: var(--c-splash-bg, #08090b);
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
          Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif !important;
      }
      @keyframes sDot{0%,60%,100%{opacity:.2;transform:scale(.75)}30%{opacity:1;transform:scale(1)}}
      .s-dot{width:9px;height:9px;border-radius:50%;background:var(--c-splash-dot, #5eead4);animation:sDot 1.2s ease-in-out infinite;}

  <style>
    #root-modal,
    #modal-modal {
      pointer-events: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
    }

    #root-modal > .wrapper,
    #modal-modal > .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #root-modal.mask > .wrapper,
    #modal-modal.mask > .wrapper {
      background-color: rgba(2, 2, 2, 0.4);
      pointer-events: all;
      width: 100vw;
      height: 100dvh;
    }

    @keyframes modalSlideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }

    @media (max-width: 767px) {
      #root-modal > .wrapper,
      #modal-modal > .wrapper {
        align-items: flex-end;
      }

      #root-modal.mask > .wrapper > *,
      #modal-modal.mask > .wrapper > * {
        animation: modalSlideUp 320ms cubic-bezier(0.32, 0.72, 0, 1) both;
        border-bottom-left-radius: 0 !important;
        border-bottom-right-radius: 0 !important;
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
  <style>
    /* reset */
    body {
      overflow: hidden;
      width: 100%;
      height: 100%;
      /*
        搭配 apple-mobile-web-app-status-bar-style=black-translucent：狀態列透明，
        body padding-top 把 body 背景色補到狀態列區域。
        body 背景：splash 期間是 var(--c-splash-bg)（fallback），CSS bundle 載入後
        被 assets/index.css 的 `body { background-color: rgb(var(--c-bg-app)); }` 蓋掉，
        改走 Design System 的 --c-bg-app token，跟著 .dark / .light 切換 → 狀態列
        顏色就跟著 token 系統連動，不是例外處理。
      */
      padding-top: env(safe-area-inset-top, 0px);
      box-sizing: border-box;
    }
    /* iOS safari / PWA — 用 100dvh 而不是 visualViewport-tracked --app-height。
       原因：iOS PWA 在 apple-mobile-web-app-status-bar-style=black-translucent 模式下，
       visualViewport.height 的回報會像 Safari 瀏覽器一樣扣掉「假想的」網址列+工具列高度，
       導致 body 被壓縮 ~80-100px，fixed bottom-0 的 MobileNavs 也跟著浮在螢幕底部上方。
       100dvh 是純 CSS 不受此 bug 影響，鍵盤彈出時也會 dynamic 縮放。 */
    @supports (-webkit-touch-callout: none) {
      body {
        position: fixed;
        width: 100%;
        height: 100dvh;
      }
      .h-screen {
        height: 100dvh !important;
        overflow: auto;
      }
    }
    /* iframe 样式覆盖 */
    body.iframe {
      position: fixed;
      top: 0;
    }
    body.iframe .guest-container {
      padding: 0;
    }
    body.iframe .guest-container .left-container,
    body.iframe .guest-container .right-container {
      border-radius: 0;
    }
    /* electron */
    body.electron .guest-container {
      padding: 0;
    }
    body.electron .guest-container .left-container,
    body.electron .guest-container .right-container {
      border-radius: 0;
    }
  </style>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="splash" style="position:fixed;inset:0;background:var(--c-splash-bg, #08090b);display:flex;align-items:center;justify-content:center;z-index:99999;">
      <div style="display:flex;gap:10px;align-items:center;">
        <span class="s-dot"></span>
        <span class="s-dot" style="animation-delay:0.16s"></span>
        <span class="s-dot" style="animation-delay:0.32s"></span>
      </div>
    </div>
    <div id="root"></div>
    <div id="root-modal"></div>
    <div id="modal-modal"></div>
    <!--

      If you open it directly in the browser, you will see an empty page.
      
      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.
        
        To begin the development, run `npm start` or `yarn start`.
        To create a production bundle, use `npm run build` or `yarn build`.
      -->
  </body>
  <script>
    // electron
    if (navigator.userAgent.indexOf("Electron/") > -1) {
      document.body.classList.add("electron");
    }
    if (window.location !== window.parent.location) {
      // The page is in an iframe
      document.body.classList.add("iframe");
    }
    // iOS PWA keyboard fix: track visualViewport height to prevent header scroll-off
    (function () {
      var rafId = null;
      function updateAppHeight() {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(function () {
          rafId = null;
          var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
          document.documentElement.style.setProperty('--app-height', h + 'px');
        });
      }
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateAppHeight);
        window.visualViewport.addEventListener('scroll', function () {
          window.scrollTo(0, 0);
        });
      }
      window.addEventListener('resize', updateAppHeight);
      updateAppHeight();
    })();
  </script>
