    <!-- Suppress ResizeObserver errors - must be first script -->
    <script>
      // Suppress benign ResizeObserver errors from virtualized lists
      // This is a known browser issue and doesn't affect functionality
      // Reference: https://github.com/WICG/resize-observer/issues/38

      (function() {
        function isResizeObserverError(message) {
          return message && (
            message.includes('ResizeObserver loop') ||
            message.includes('ResizeObserver loop completed') ||
            message.includes('ResizeObserver loop limit exceeded')
          );
        }

        // Intercept window.onerror
        const originalOnError = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          if (typeof message === 'string' && isResizeObserverError(message)) {
            return true; // Suppress ResizeObserver errors
          }
          if (originalOnError) {
            return originalOnError.apply(this, arguments);
          }
          return false;
        };

        // Intercept error events (capture phase to catch early)
        window.addEventListener('error', function(e) {
          if (e.message && isResizeObserverError(e.message)) {
            e.stopImmediatePropagation();
            e.preventDefault();
            return true;
          }
        }, true);

        // Intercept console.error
        const originalConsoleError = console.error;
        console.error = function() {
          const args = Array.from(arguments);
          if (args.length > 0 && typeof args[0] === 'string' && isResizeObserverError(args[0])) {
            return; // Suppress
          }
          originalConsoleError.apply(console, args);
        };
      })();
    </script>

  <style>
    #root-modal,
    #modal-modal {
      pointer-events: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
    }

    #root-modal > .wrapper,
    #modal-modal > .wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #root-modal.mask > .wrapper,
    #modal-modal.mask > .wrapper {
      background-color: rgba(2, 2, 2, 0.4);
      pointer-events: all;
      width: 100vw;
      height: 100dvh;
    }

    @keyframes modalSlideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);   opacity: 1; }
    }

    @media (max-width: 767px) {
      #root-modal > .wrapper,
      #modal-modal > .wrapper {
        align-items: flex-end;
      }

      #root-modal.mask > .wrapper > *,
      #modal-modal.mask > .wrapper > * {
        animation: modalSlideUp 320ms cubic-bezier(0.32, 0.72, 0, 1) both;
        border-bottom-left-radius: 0 !important;
        border-bottom-right-radius: 0 !important;
        width: 100%;
        max-width: 100%;
      }
    }
  </style>
  <style>
    /* reset */
    body {
      overflow: hidden;
      width: 100%;
      height: 100%;
    }
    /* iOS safari — use --app-height set by visualViewport JS below */
    @supports (-webkit-touch-callout: none) {
      body {
        position: fixed;
        width: 100%;
        height: var(--app-height, 100svh);
      }
      .h-screen {
        height: var(--app-height, 100svh) !important;
        overflow: auto;
      }
    }
    /* iframe 样式覆盖 */
    body.iframe {
      position: fixed;
      top: 0;
    }
    body.iframe .guest-container {
      padding: 0;
    }
    body.iframe .guest-container .left-container,
    body.iframe .guest-container .right-container {
      border-radius: 0;
    }
    /* electron */
    body.electron .guest-container {
      padding: 0;
    }
    body.electron .guest-container .left-container,
    body.electron .guest-container .right-container {
      border-radius: 0;
    }
  </style>

    </div>
    <style>
      @keyframes sDot{0%,60%,100%{opacity:.2;transform:scale(.75)}30%{opacity:1;transform:scale(1)}}
      .s-dot{width:9px;height:9px;border-radius:50%;background:#5eead4;animation:sDot 1.2s ease-in-out infinite;}
    </style>
    <div id="root"></div>
    <div id="root-modal"></div>
    <div id="modal-modal"></div>

  <script>
    // electron
    if (navigator.userAgent.indexOf("Electron/") > -1) {
      document.body.classList.add("electron");
    }
    if (window.location !== window.parent.location) {
      // The page is in an iframe
      document.body.classList.add("iframe");
    }
    // iOS PWA keyboard fix: track visualViewport height to prevent header scroll-off
    (function () {
      var rafId = null;
      function updateAppHeight() {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(function () {
          rafId = null;
          var h = window.visualViewport ? window.visualViewport.height : window.innerHeight;
          document.documentElement.style.setProperty('--app-height', h + 'px');
        });
      }
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', updateAppHeight);
        window.visualViewport.addEventListener('scroll', function () {
          window.scrollTo(0, 0);
        });
      }
      window.addEventListener('resize', updateAppHeight);
      updateAppHeight();
    })();
  </script>
